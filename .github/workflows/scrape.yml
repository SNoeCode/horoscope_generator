name: Scrape Daily Horoscopes

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout scraper repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python update_horoscope.py

      - name: Push horoscope.json to github.io repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git clone https://x-access-token:${GH_PAT}@github.com/SNoeCode/SNoeCode.github.io.git gh-pages

          # Rotate current horoscope.json → horoscope_yesterday.json with correct date
          cp gh-pages/horoscope.json gh-pages/horoscope_yesterday.json
          YESTERDAY=$(date -d "yesterday" "+%B %d, %Y")
          python3 -c "
import json, sys
path = 'gh-pages/horoscope_yesterday.json'
with open(path) as f:
    data = json.load(f)
for sign in data:
    data[sign]['date'] = sys.argv[1]
with open(path, 'w') as f:
    json.dump(data, f, indent=2)
" "$YESTERDAY"

          # Copy today's freshly generated horoscopes
          cp horoscope.json gh-pages/horoscope.json

          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add horoscope.json horoscope_yesterday.json
          git diff --cached --quiet || git commit -m "chore: update daily horoscopes"
          git push origin main
